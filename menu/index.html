<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#141414;
color:white;
}

/* HEADER */

.header{
padding:20px;
max-width:1100px;
margin:auto;
text-align:center;
}

.logo{
font-size:28px;
font-weight:bold;
color:#e50914;
margin-bottom:15px;
}

/* SEARCH */

.search{
margin-bottom:25px;
}

.search input{
width:100%;
padding:12px;
border:none;
border-radius:4px;
background:#222;
color:white;
}

/* GRID */

.grid{
max-width:1100px;
margin:auto;
padding:10px 20px 40px;
display:grid;
grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
gap:20px;
}

/* CARD */

.card{
position:relative;
overflow:hidden;
border-radius:6px;
transition:.3s;
}

.card:hover{
transform:scale(1.08);
z-index:5;
}

/* POSTER */

.poster img{
width:100%;
aspect-ratio:2/3;
object-fit:cover;
display:block;
}

/* PLAY */

.play{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:38px;
opacity:0;
transition:.3s;
}

.card:hover .play{
opacity:1;
}

/* TITLE */

.title{
position:absolute;
bottom:0;
width:100%;
padding:12px;
font-size:14px;
background:linear-gradient(to top,rgba(0,0,0,.9),transparent);
text-align:center;
}

/* BADGE */

.badge{
position:absolute;
top:8px;
left:8px;
background:#e50914;
padding:3px 7px;
font-size:11px;
border-radius:3px;
}

/* MOBILE */

@media(max-width:600px){

.grid{
grid-template-columns:1fr;
}

.card:hover{
transform:none;
}

}

a{
text-decoration:none;
color:white;
}

</style>
